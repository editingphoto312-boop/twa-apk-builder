name: Build TWA APK

on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

env:
  APP_URL:  "${{ github.event.client_payload.url }}"
  APP_NAME: "${{ github.event.client_payload.appName }}"
  PKG_ID:   "${{ github.event.client_payload.packageId }}"

jobs:
  build:
    name: Generate & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60          # FIX-1: was 30 — healthy builds need 15-25 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'     # FIX-2: was '20' — Node 20 actions are deprecated

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build tools
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate Android keystore
        run: |
          KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KS_PASS="${KS_PASS:-android}"
          echo "KEYSTORE_PASS=$KS_PASS" >> $GITHUB_ENV

          keytool -genkeypair \
            -v \
            -keystore "$GITHUB_WORKSPACE/android.keystore" \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KS_PASS" \
            -keypass  "$KS_PASS" \
            -dname "CN=TWA Builder, OU=TWA, O=TWA, L=City, S=State, C=US"

          echo "Keystore created at $GITHUB_WORKSPACE/android.keystore"

      - name: Generate twa-manifest.json
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const url = process.env.APP_URL;
          const parsed = new URL(url);
          const host   = parsed.host;

          const pkgId = process.env.PKG_ID ||
            'com.twa.' + host.replace(/[^a-z0-9]/gi, '').toLowerCase();

          const appName  = process.env.APP_NAME || 'TWA App';
          const ksPath   = process.env.GITHUB_WORKSPACE + '/android.keystore';
          const ksPass   = process.env.KEYSTORE_PASS || 'android';

          const manifest = {
            packageId:   pkgId,
            host,
            name:         appName,
            launcherName: appName.substring(0, 12),
            display:      'standalone',
            orientation:  'default',
            themeColor:          '#FFFFFF',
            navigationColor:     '#000000',
            navigationColorDark: '#000000',
            backgroundColor:     '#FFFFFF',
            startUrl:  '/',
            iconUrl:        url.replace(/\/$/, '') + '/icon-512x512.png',
            maskableIconUrl:url.replace(/\/$/, '') + '/icon-512x512.png',
            shortcuts: [],
            // IMPORTANT: appVersion (string) must equal String(appVersionCode)
            // so bubblewrap auto-upgrades version without asking the user.
            appVersion:     '1',
            appVersionCode: 1,
            signingKey: {
              path:          ksPath,
              alias:         'android',
              keyPassword:   ksPass,
              storePassword: ksPass
            },
            splashScreenFadeOutDuration: 300,
            enableNotifications:        false,
            enableSiteSettingsShortcut: true,
            isChromeOSOnly: false,
            isMetaQuest:    false,
            fullScopeUrl:   url.replace(/\/$/, '') + '/',
            minSdkVersion:  19,
            targetSdkVersion: 34,
            generatorApp:   'bubblewrap-cli',
            webManifestUrl: url.replace(/\/$/, '') + '/manifest.json',
            fallbackType:   'customtabs',
            features:       {},
            alphaDependencies: { enabled: false }
          };

          fs.writeFileSync('twa-manifest.json', JSON.stringify(manifest, null, 2));
          console.log('twa-manifest.json generated');
          console.log('   Package ID:', pkgId);
          console.log('   Host:      ', host);
          console.log('   App name:  ', appName);
          console.log('   Keystore:  ', ksPath);
          EOF

      - name: Configure Bubblewrap SDK paths (non-interactive)
        run: |
          JAVA_HOME_PATH="${JAVA_HOME}"
          ANDROID_SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"

          echo "Java home:   $JAVA_HOME_PATH"
          echo "Android SDK: $ANDROID_SDK_PATH"

          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' \
            "$JAVA_HOME_PATH" "$ANDROID_SDK_PATH" \
            > ~/.bubblewrap/config.json

          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      # ══════════════════════════════════════════════════════════════════════════
      # FIX-3 (CRITICAL) — 100% non-interactive bubblewrap build
      #
      # ROOT CAUSE (found by reading bubblewrap source code directly):
      #
      #   `bubblewrap build` has exactly 3 possible interactive prompts:
      #
      #   PROMPT 1 — "No checksum file found, regenerate? (Y/n)"
      #     Trigger : manifest-checksum.txt does not exist (always on first run)
      #     Old code: `yes ""` sends "" → Inquirer confirm default=true → accepts Y ✓
      #     Status  : was already handled correctly
      #
      #   PROMPT 2 — "versionName for the new App version:"
      #     Trigger : ONLY if appVersion (string) !== String(appVersionCode)
      #     Fix     : manifest always has appVersion:'1' and appVersionCode:1
      #               → '1' === '1' → auto-upgrade → prompt NEVER appears ✓
      #
      #   PROMPT 3 — "Password for the Key Store:"  (min 6 chars)
      #   PROMPT 4 — "Password for the Key:"        (min 6 chars)
      #     Trigger : ONLY if env vars BUBBLEWRAP_KEYSTORE_PASSWORD or
      #               BUBBLEWRAP_KEY_PASSWORD are NOT set
      #     Old code: `yes ""` sends "" → length 0 → REJECTED → infinite loop
      #               (this is what caused 166000+ lines of repeated error)
      #     Fix     : set the two env vars → bubblewrap skips prompts entirely,
      #               prints "Using passwords set in the BUBBLEWRAP_KEYSTORE_PASSWORD..."
      #               This is bubblewrap's OFFICIAL CI/CD mechanism (build.js line 78-85)
      #
      #   RESULT: After fix, only Prompt 1 appears. `yes ""` handles it correctly.
      #           Build is 100% non-interactive. No pexpect needed.
      # ══════════════════════════════════════════════════════════════════════════
      - name: Build APK with Bubblewrap
        run: |
          mkdir -p twa-build
          cp twa-manifest.json twa-build/
          cd twa-build

          # ── 1. Generate placeholder icon (512x512 solid-colour PNG) ──────────
          python3 - << 'GENICON'
          import struct, zlib, os

          def solid_png(width=512, height=512, r=66, g=133, b=244):
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
              ihdr_crc  = zlib.crc32(b'IHDR' + ihdr_data) & 0xFFFFFFFF
              ihdr = struct.pack('>I', 13) + b'IHDR' + ihdr_data + struct.pack('>I', ihdr_crc)
              row  = b'\x00' + bytes([r, g, b]) * width
              raw  = row * height
              comp = zlib.compress(raw, 9)
              idat_crc = zlib.crc32(b'IDAT' + comp) & 0xFFFFFFFF
              idat = struct.pack('>I', len(comp)) + b'IDAT' + comp + struct.pack('>I', idat_crc)
              iend_crc = zlib.crc32(b'IEND') & 0xFFFFFFFF
              iend = struct.pack('>I', 0) + b'IEND' + struct.pack('>I', iend_crc)
              return sig + ihdr + idat + iend

          os.makedirs('/tmp/twa-local-server', exist_ok=True)
          with open('/tmp/twa-local-server/icon-512x512.png', 'wb') as f:
              f.write(solid_png())
          print('Placeholder icon written (512x512 PNG)')
          GENICON

          # ── 2. Create local web manifest (icons point to localhost) ───────────
          node - << 'GENWEBMANIFEST'
          const fs = require('fs');
          const m  = JSON.parse(fs.readFileSync('./twa-manifest.json', 'utf8'));
          const webManifest = {
            name:             m.name,
            short_name:       m.launcherName || m.name.substring(0, 12),
            start_url:        m.startUrl  || '/',
            scope:            '/',
            display:          m.display   || 'standalone',
            orientation:      m.orientation || 'any',
            background_color: m.backgroundColor || '#ffffff',
            theme_color:      m.themeColor      || '#ffffff',
            icons: [
              { src: 'http://127.0.0.1:3333/icon-512x512.png', sizes: '512x512', type: 'image/png' },
              { src: 'http://127.0.0.1:3333/icon-512x512.png', sizes: '512x512', type: 'image/png', purpose: 'maskable' }
            ],
            shortcuts: m.shortcuts || []
          };
          fs.writeFileSync('/tmp/twa-local-server/manifest.json', JSON.stringify(webManifest, null, 2));
          fs.writeFileSync('/tmp/twa-local-server/index.html',
            `<!DOCTYPE html><html><head><link rel="manifest" href="/manifest.json"><title>${m.name}</title></head><body></body></html>`);
          console.log('Local web manifest created');
          GENWEBMANIFEST

          # ── 3. Start local HTTP server ────────────────────────────────────────
          python3 -m http.server 3333 \
            --directory /tmp/twa-local-server \
            --bind 127.0.0.1 \
            > /tmp/httpserver.log 2>&1 &
          HTTP_PID=$!

          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:3333/manifest.json > /dev/null 2>&1 \
              && echo "Local manifest server ready (${i}s)" && break
            sleep 1
          done

          curl -sf http://127.0.0.1:3333/manifest.json > /dev/null 2>&1 \
            || { echo "ERROR: local HTTP server did not start"; cat /tmp/httpserver.log; exit 1; }

          # ── 4. Patch twa-manifest.json: all URLs to localhost ─────────────────
          node - << 'PATCHMANIFEST'
          const fs = require('fs');
          const m  = JSON.parse(fs.readFileSync('./twa-manifest.json', 'utf8'));
          m.webManifestUrl  = 'http://127.0.0.1:3333/manifest.json';
          m.iconUrl         = 'http://127.0.0.1:3333/icon-512x512.png';
          m.maskableIconUrl = 'http://127.0.0.1:3333/icon-512x512.png';
          fs.writeFileSync('./twa-manifest.json', JSON.stringify(m, null, 2));
          console.log('twa-manifest.json patched - all URLs point to localhost');
          PATCHMANIFEST

          # ── 5. FIX: Set official bubblewrap CI env vars → password prompts skip ─
          # Source: bubblewrap/cli/dist/lib/cmds/build.js getPasswords()
          #   if (envKeyPass !== undefined && envKeystorePass !== undefined) {
          #     printMessage('Using passwords set in the BUBBLEWRAP_KEYSTORE_PASSWORD...')
          #     return { keystorePassword, keyPassword }   ← returns immediately, no prompts
          #   }
          export BUBBLEWRAP_KEYSTORE_PASSWORD="${KEYSTORE_PASS}"
          export BUBBLEWRAP_KEY_PASSWORD="${KEYSTORE_PASS}"
          echo "Bubblewrap password env vars set (${#KEYSTORE_PASS} chars)"

          # ── 6. Build ──────────────────────────────────────────────────────────
          # After the fix above, only ONE interactive prompt remains:
          #   "No checksum file found, regenerate? (Y/n)"  [default: Y]
          # `yes ""` sends empty line → Inquirer accepts default Y → runs update ✓
          # No password prompts, no version prompts — fully non-interactive.
          yes "" | bubblewrap build --skipPwaValidation 2>&1 || true

          # ── 7. Stop local server ──────────────────────────────────────────────
          kill $HTTP_PID 2>/dev/null || true

          # ── 8. Verify APK was produced ────────────────────────────────────────
          APK_CHECK=$(find . -name "*release*.apk" 2>/dev/null | grep -v unsigned | head -1)
          if [ -z "$APK_CHECK" ]; then
            APK_CHECK=$(find . -name "*.apk" 2>/dev/null | head -1)
          fi

          if [ -z "$APK_CHECK" ]; then
            echo "Build failed - no APK produced. Showing Gradle output:"
            find . -name "*.log" 2>/dev/null -exec tail -50 {} \; || true
            find . -path "*/build/outputs" 2>/dev/null | head -20 || true
            exit 1
          fi
          echo "APK found: $APK_CHECK"

      - name: Locate APK
        run: |
          APK=$(find . -name "*release*.apk" 2>/dev/null | grep -v unsigned | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found - check the build logs above."
            exit 1
          fi
          SAFE=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          FINAL="${SAFE}.apk"
          cp "$APK" "$FINAL"
          echo "APK_FILE=$FINAL" >> $GITHUB_ENV
          echo "APK_LABEL=$SAFE" >> $GITHUB_ENV
          echo "APK ready: $FINAL"

      - name: Delete old 'latest' release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin --delete refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          gh release create latest "${{ env.APK_FILE }}" \
            --repo "${{ github.repository }}" \
            --title "Latest Build - ${APP_NAME}" \
            --notes "## APK Ready

          | Field | Value |
          |---|---|
          | **App Name** | ${APP_NAME} |
          | **Source URL** | ${APP_URL} |
          | **Built at** | ${TIMESTAMP} |

          ### How to install
          1. Download the \`.apk\` file below
          2. Enable *Install from unknown sources* on your Android device
          3. Open the file to install" \
            --latest

          echo "Release: https://github.com/${{ github.repository }}/releases/tag/latest"

      - name: Job summary
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | $APP_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | $APP_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | [Download APK](https://github.com/${{ github.repository }}/releases/tag/latest) |" >> $GITHUB_STEP_SUMMARY
          
