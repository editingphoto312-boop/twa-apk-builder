name: 🤖 Build TWA APK

on:
  repository_dispatch:
    types: [build-apk]

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (repo Settings → Secrets → Actions):
#   KEYSTORE_PASSWORD  → signing keystore password (defaults to "android")
#
# The built-in GITHUB_TOKEN handles creating the release automatically.
# ─────────────────────────────────────────────────────────────────────────────

permissions:
  contents: write   # needed to create releases and upload assets

env:
  APP_URL:  ${{ github.event.client_payload.url }}
  APP_NAME: ${{ github.event.client_payload.appName }}
  PKG_ID:   ${{ github.event.client_payload.packageId }}

jobs:
  build:
    name: Generate & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build tools
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 5. Bubblewrap CLI ────────────────────────────────────────────────────
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # ── 6. Signing keystore ──────────────────────────────────────────────────
      - name: Generate Android keystore
        run: |
          KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KS_PASS="${KS_PASS:-android}"
          echo "KEYSTORE_PASS=$KS_PASS" >> $GITHUB_ENV

          keytool -genkeypair \
            -v \
            -keystore "$GITHUB_WORKSPACE/android.keystore" \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KS_PASS" \
            -keypass  "$KS_PASS" \
            -dname "CN=TWA Builder, OU=TWA, O=TWA, L=City, S=State, C=US"

          echo "✅ Keystore created"

      # ── 7. Generate twa-manifest.json ────────────────────────────────────────
      - name: Generate twa-manifest.json
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const url = process.env.APP_URL;
          const parsed = new URL(url);
          const host   = parsed.host;

          const pkgId = process.env.PKG_ID ||
            'com.twa.' + host.replace(/[^a-z0-9]/gi, '').toLowerCase();

          const appName = process.env.APP_NAME || 'TWA App';

          const manifest = {
            packageId:   pkgId,
            host,
            name:         appName,
            launcherName: appName.substring(0, 12),
            display:      'standalone',
            orientation:  'default',
            themeColor:          '#FFFFFF',
            navigationColor:     '#000000',
            navigationColorDark: '#000000',
            backgroundColor:     '#FFFFFF',
            startUrl:  '/',
            iconUrl:        url.replace(/\/$/, '') + '/icon-512x512.png',
            maskableIconUrl:url.replace(/\/$/, '') + '/icon-512x512.png',
            shortcuts: [],
            appVersion:     '1',
            appVersionCode: 1,
            signingKey: {
              path:  '../../android.keystore',
              alias: 'android'
            },
            splashScreenFadeOutDuration: 300,
            enableNotifications:        false,
            enableSiteSettingsShortcut: true,
            isChromeOSOnly: false,
            isMetaQuest:    false,
            fullScopeUrl:   url.replace(/\/$/, '') + '/',
            minSdkVersion:  19,
            targetSdkVersion: 34,
            generatorApp:   'bubblewrap-cli',
            webManifestUrl: url.replace(/\/$/, '') + '/manifest.json',
            fallbackType:   'customtabs',
            features:       {},
            alphaDependencies: { enabled: false }
          };

          fs.writeFileSync('twa-manifest.json', JSON.stringify(manifest, null, 2));
          console.log('✅ twa-manifest.json generated');
          console.log('   Package ID:', pkgId);
          console.log('   Host:      ', host);
          console.log('   App name:  ', appName);
          EOF

      # ── 8. Build APK ─────────────────────────────────────────────────────────
      - name: Build APK with Bubblewrap
        run: |
          mkdir -p twa-build
          cp twa-manifest.json twa-build/
          cd twa-build
          printf "%s\n%s\n" "$KEYSTORE_PASS" "$KEYSTORE_PASS" \
            | bubblewrap build --skipPwaValidation

      # ── 9. Locate & rename APK ───────────────────────────────────────────────
      - name: Locate APK
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK found — check the build logs above."
            exit 1
          fi
          SAFE=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          FINAL="${SAFE}.apk"
          cp "$APK" "$FINAL"
          echo "APK_FILE=$FINAL"   >> $GITHUB_ENV
          echo "APK_LABEL=$SAFE"   >> $GITHUB_ENV
          echo "✅ APK ready: $FINAL"

      # ── 10. Delete existing 'latest' release (so we can recreate it) ─────────
      - name: Delete old 'latest' release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ignore errors — release may not exist yet on first run
          gh release delete latest --yes 2>/dev/null || true
          git push origin --delete refs/tags/latest 2>/dev/null || true

      # ── 11. Create GitHub Release tagged 'latest' & upload APK ───────────────
      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          APP_URL_SAFE="${APP_URL}"
          APP_NAME_SAFE="${APP_NAME}"

          gh release create latest "${{ env.APK_FILE }}" \
            --repo "${{ github.repository }}" \
            --title "Latest Build — ${APP_NAME_SAFE}" \
            --notes "$(cat <<NOTES
          ## ✅ APK Ready for Download

          | Field       | Value                      |
          |-------------|----------------------------|
          | **App Name**  | ${APP_NAME_SAFE}         |
          | **Source URL**| ${APP_URL_SAFE}          |
          | **Built at**  | ${TIMESTAMP}             |

          ### How to install
          1. Download the \`.apk\` file below
          2. On your Android device, enable *Install from unknown sources*
          3. Open the downloaded file to install

          > Built automatically with [Bubblewrap](https://github.com/GoogleChromeLabs/bubblewrap) via GitHub Actions.
          NOTES
          )" \
            --latest

          echo "✅ Release published at:"
          echo "   https://github.com/${{ github.repository }}/releases/tag/latest"

      # ── 12. Summary ──────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | $APP_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | $APP_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | [Download APK](https://github.com/${{ github.repository }}/releases/tag/latest) |" >> $GITHUB_STEP_SUMMARY
          
